name: Generate profile summary cards

on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "assets/**"
      - "profile-summary-card-output/**"

concurrency:
  group: profile-summary-cards-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download dracula profile cards
        env:
          USERNAME: ${{ github.repository_owner }}
          THEME: dracula
          BASE_URL: https://github-profile-summary-cards.vercel.app/api/cards
        run: |
          set -euo pipefail
          mkdir -p "profile-summary-card-output/${THEME}"

          download_card() {
            local endpoint="$1"
            local output="$2"
            local url="${BASE_URL}/${endpoint}?username=${USERNAME}&theme=${THEME}"
            local tmp="${output}.tmp"
            local attempt

            for attempt in 1 2 3 4 5; do
              if curl -fsSL \
                -H "Accept: image/svg+xml" \
                "${url}" \
                -o "${tmp}"; then
                if grep -q '<svg' "${tmp}" && ! grep -q 'ERROR!!!' "${tmp}"; then
                  mv "${tmp}" "${output}"
                  echo "Downloaded ${output} on attempt ${attempt}"
                  return 0
                fi
                echo "${output} returned error SVG on attempt ${attempt}"
              else
                echo "curl failed for ${output} on attempt ${attempt}"
              fi
              sleep $((attempt * 10))
            done

            rm -f "${tmp}"
            if [ -f "${output}" ] && grep -q '<svg' "${output}" && ! grep -q 'ERROR!!!' "${output}"; then
              echo "Keeping existing valid ${output} after failed refresh"
              return 0
            fi

            echo "Failed to download valid ${output}"
            return 1
          }

          download_card "profile-details" "profile-summary-card-output/${THEME}/0-profile-details.svg"
          sleep 5
          download_card "repos-per-language" "profile-summary-card-output/${THEME}/1-repos-per-language.svg"
          sleep 5
          download_card "most-commit-language" "profile-summary-card-output/${THEME}/2-most-commit-language.svg"
          sleep 5
          download_card "stats" "profile-summary-card-output/${THEME}/3-stats.svg"

      - name: Commit profile summary cards
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add profile-summary-card-output/

          if git diff --staged --quiet; then
            echo "No profile card changes detected. Skipping commit."
            exit 0
          fi

          git commit -m "Update profile summary cards [automated]"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying..."
            sleep $((attempt * 5))
          done

          echo "Push failed after 3 attempts."
          exit 1
