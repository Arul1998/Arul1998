name: Generate profile summary cards

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "assets/**"
      - "profile-summary-card-output/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 0
          AUTO_PUSH: false

      - name: Commit profile summary cards
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add profile-summary-card-output/

          if git diff --staged --quiet; then
            echo "No profile card changes detected. Skipping commit."
            exit 0
          fi

          git pull --rebase origin main
          git commit -m "Update profile summary cards [automated]"
          git push
