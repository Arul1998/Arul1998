name: Generate Pac-Man contribution graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate pacman-contribution-graph SVGs
        uses: abozanona/pacman-contribution-graph@d258e3fb01511c1ff4fe6418408ede37b2ad4935 # v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Collect SVGs
        run: |
          mkdir -p generated
          shopt -s globstar nullglob
          files=(dist/*.svg **/*contribution-graph*.svg)
          filtered_files=()
          for file in "${files[@]}"; do
            if [[ "$file" != generated/* && "$file" != output/* ]]; then
              filtered_files+=("$file")
            fi
          done
          if [ ${#filtered_files[@]} -eq 0 ]; then
            echo "No generated SVG files found."
            exit 1
          fi
          cp "${filtered_files[@]}" generated/

      - name: Push SVGs to output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git clone --depth=1 --branch=output "$repo_url" output-repo 2>/dev/null; then
            echo "Checked out existing output branch."
          else
            echo "Creating output branch for the first time."
            mkdir output-repo
            git -C output-repo init -b output
            git -C output-repo config user.email "github-actions[bot]@users.noreply.github.com"
            git -C output-repo config user.name "github-actions[bot]"
          fi

          cp generated/*.svg output-repo/

          cd output-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .

          if git diff --staged --quiet; then
            echo "No SVG changes detected. Skipping push to avoid unnecessary output branch updates."
            exit 0
          fi

          git commit -m "Update Pac-Man contribution graph [automated]"
          git push --force "$repo_url" output
