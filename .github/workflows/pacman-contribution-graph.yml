name: Generate Pac-Man contribution graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate pacman-contribution-graph SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Copy SVGs to output folder
        run: |
          mkdir -p output
          shopt -s globstar nullglob
          files=(dist/*.svg **/*contribution-graph*.svg)
          filtered_files=()
          for file in "${files[@]}"; do
            if [[ "$file" != output/* ]]; then
              filtered_files+=("$file")
            fi
          done
          if [ ${#filtered_files[@]} -eq 0 ]; then
            echo "No generated SVG files found."
            exit 1
          fi
          cp "${filtered_files[@]}" output/

      - name: Commit and push SVGs to main
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git diff --staged --quiet || git commit -m "Update Pac-Man contribution graph [automated]"
          git push
