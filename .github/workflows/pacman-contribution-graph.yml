name: Generate Pac-Man contribution graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "assets/**"
      - "profile-summary-card-output/**"

env:
  # Keep Node 20 until the action supports Node 24 natively (removed Sept 2026).
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate pacman-contribution-graph SVGs
        id: generate
        continue-on-error: true
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Retry generate on failure
        id: retry
        if: steps.generate.outcome == 'failure'
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}
          player_style: conservative

      - name: Fail if generation failed
        if: steps.generate.outcome == 'failure' && steps.retry.outcome == 'failure'
        run: |
          echo "Pac-Man graph generation failed after 2 attempts."
          exit 1

      - name: Collect SVGs
        run: |
          mkdir -p generated
          shopt -s globstar nullglob
          files=(dist/*.svg **/*contribution-graph*.svg)
          filtered_files=()
          for file in "${files[@]}"; do
            if [[ "$file" != generated/* && "$file" != assets/* ]]; then
              filtered_files+=("$file")
            fi
          done
          if [ ${#filtered_files[@]} -eq 0 ]; then
            echo "No generated SVG files found."
            exit 1
          fi
          cp "${filtered_files[@]}" generated/

      - name: Commit SVGs to main
        run: |
          mkdir -p assets
          cp generated/*.svg assets/
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add assets/

          if git diff --staged --quiet; then
            echo "No SVG changes detected. Skipping commit."
            exit 0
          fi

          git commit -m "Update Pac-Man contribution graph [automated]"
          git pull --rebase origin main
          git push
