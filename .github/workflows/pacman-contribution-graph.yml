name: Generate Pac-Man contribution graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "assets/**"
      - "profile-summary-card-output/**"

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate pacman-contribution-graph SVGs
        uses: abozanona/pacman-contribution-graph@d258e3fb01511c1ff4fe6418408ede37b2ad4935 # v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Collect SVGs
        run: |
          mkdir -p generated
          shopt -s globstar nullglob
          files=(dist/*.svg **/*contribution-graph*.svg)
          filtered_files=()
          for file in "${files[@]}"; do
            if [[ "$file" != generated/* && "$file" != assets/* ]]; then
              filtered_files+=("$file")
            fi
          done
          if [ ${#filtered_files[@]} -eq 0 ]; then
            echo "No generated SVG files found."
            exit 1
          fi
          cp "${filtered_files[@]}" generated/

      - name: Commit SVGs to main
        run: |
          mkdir -p assets
          cp generated/*.svg assets/
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add assets/

          if git diff --staged --quiet; then
            echo "No SVG changes detected. Skipping commit."
            exit 0
          fi

          git commit -m "Update Pac-Man contribution graph [automated]"
          git push
